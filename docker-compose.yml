services:
  # -------------------- RUBiS SUT --------------------
  rubisweb:
    build: ./rubisweb
    depends_on:
      - rubisdb1
    ports:
      - "8080:80"
    profiles: ["rubis"]

  rubisdb1:
    build: ./rubisdb
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
      - MYSQL_DATABASE=rubis
    ports:
      - "3306:3306"
    profiles: ["rubis"]

  # -------------------- DVD2 SUT --------------------
  dvd2web:
    build: ./dvd2/web
    depends_on:
      - dvd2db
    ports:
      - "8080:80"
    profiles: ["dvd"]

  dvd2db:
    build: ./dvd2/db
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
      - MYSQL_DATABASE=dvd2db
    ports:
      - "3306:3306"
    profiles: ["dvd"]

  # -------------------- TeaStore SUT --------------------
  webui:
    image: descartesresearch/teastore-webui
    environment:
      HOST_NAME: "webui"
      REGISTRY_HOST: "registry"
    ports:
      - "8080:8080"
    profiles: ["teastore"]

  auth:
    image: descartesresearch/teastore-auth
    environment:
      HOST_NAME: "auth"
      REGISTRY_HOST: "registry"
    profiles: ["teastore"]

  image:
    image: descartesresearch/teastore-image
    environment:
      HOST_NAME: "image"
      REGISTRY_HOST: "registry"
    profiles: ["teastore"]

  recommender:
    image: descartesresearch/teastore-recommender
    environment:
      HOST_NAME: "recommender"
      REGISTRY_HOST: "registry"
    profiles: ["teastore"]

  db:
    build:
      context: ./teastore/utilities/tools.descartes.teastore.database
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    profiles: ["teastore"]

  registry:
    image: descartesresearch/teastore-registry
    ports:
      - "5000:5000"
    profiles: ["teastore"]

  persistence:
    image: descartesresearch/teastore-persistence
    environment:
      HOST_NAME: "persistence"
      REGISTRY_HOST: "registry"
      DB_HOST: "db"
      DB_PORT: "3306"
    profiles: ["teastore"]

  # -------------------- XCS Dev --------------------
  xcs-dev:
    container_name: xcs-dev        
    build:
      context: ./XCS
    volumes:
      - ./XCS:/app/src
      - ./XCS/results:/app/results
      - /var/run/docker.sock:/var/run/docker.sock
    tty: true
    stdin_open: true
    entrypoint: ["/bin/bash"]
    ports:
      - "1234:1234"
    profiles: ["dev"]

  # -------------------- XCS Prod --------------------
  xcs-prod:
    build:
      context: ./XCS
    volumes:
      - ./XCS:/app/src
      - ./XCS/results:/app/results
      - /var/run/docker.sock:/var/run/docker.sock
    tty: true
    stdin_open: true
    entrypoint:
      #["sh", "-c", "find /app/src -name '*.sh' -exec chmod +x {} \\; && echo 'Waiting for SUT...' && sleep 3 && g++ -O2 src/*.cpp -o xcs -I/usr/include/mariadb -ltinyxml2 -lmariadb && ./xcs"]
      ["sh", "-c", "find /app/src -name '*.sh' -exec chmod +x {} \\; && echo 'Waiting for SUT...' && sleep 3 && g++ -O2 src/*.cpp -o xcs -I/usr/include/mariadb /app/src/src/xcscfc/libXCSCFC.so -ltinyxml2 -lmariadb -Wl,-rpath=/app/src/src/xcscfc && ./xcs"]
    profiles: ["prod"]